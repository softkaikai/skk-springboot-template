spring:
  application:
    name: springboot1
  datasource:
    url: jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    # 服务地址
    host: localhost
    # 端口
    port: 6379
    # 密码，无密码注释
    # password: 123456
    # 选择库
    database: 0
    # 超时时间
    timeout: 3000ms
    # Lettuce 连接池配置
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
        max-wait: 3000ms

server:
  port: 8080