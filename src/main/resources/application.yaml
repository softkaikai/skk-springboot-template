spring:
  application:
    name: springboot1
  devtools:
    restart:
      enabled: true  # 开启热部署
      exclude: static/**,public/**,templates/**  # 静态资源不重启
  datasource:
    url: jdbc:mysql://localhost:3306/shop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: 110.42.222.216     # RabbitMQ 地址
    port: 5672           # 端口
    username: admin       # 默认账号
    password: 123456       # 默认密码
    virtual-host: /       # 虚拟主机
  data:
    redis:
      # 服务地址
      host: 110.42.222.216
  #    host: localhost
      # 端口
      port: 6379
      # 密码，无密码注释
  #    password: 123456
      # 选择库
      database: 0
      # 超时时间
      timeout: 10000ms
      # Lettuce 连接池配置
      lettuce:
        # 连接池
        pool:
          max-active: 20    # 最大活跃连接数
          max-idle: 10      # 最大空闲连接
          min-idle: 5       # 最小空闲连接
          max-wait: 1000    # 最大等待时间(毫秒)，-1无限制

server:
  port: 8080